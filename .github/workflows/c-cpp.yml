name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev build-essential zlib1g-dev libbz2-dev

      - name: Build signalserver
        working-directory: src
        run: |
          make clean
          make

      - name: Check generated binaries
        working-directory: src
        run: |
          test -f signalserver
          test -L signalserverHD
          test -L signalserverLIDAR
